<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>广州极速达 · 山姆新仓开业</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #060e3c; }
    body { font-family: 'Noto Sans SC', 'PingFang SC', sans-serif; color: white; }

    /* ===== CSS Variables ===== */
    :root {
      --sams-blue: #125ADC;
      --sams-orange: #FF7820;
      --sams-text-muted: rgba(255,255,255,0.5);
      --map-blue: #09123a;
    }

    /* ===== Scroll Container ===== */
    #scroll-container {
      width: 100%;
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    #scroll-container::-webkit-scrollbar { display: none; }

    /* ===== Screen Base ===== */
    .screen {
      width: 100%;
      height: 100svh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      padding-top: 56px;
    }

    /* ===== NAV BAR - fixed, covers both screens ===== */
    .global-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      /* frosted glass */
      background: rgba(6, 14, 60, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      height: 56px;
    }
    .global-nav img {
      display: block;
    }
    .nav-logo-svg {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ===== SCREEN 1: Hero ===== */
    #screen-1 {
      background: #060e3c;
      justify-content: space-between;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .hero-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0.55;
    }
    /* dark overlay */
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(6,14,60,0.6) 0%,
        rgba(6,14,60,0.25) 40%,
        rgba(6,14,60,0.55) 75%,
        rgba(6,14,60,0.95) 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 5;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
      text-align: center;
      margin: auto 0;
    }
    .hero-subtitle-top {
      font-size: 13px;
      color: var(--sams-text-muted);
      letter-spacing: 2px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hero-subtitle-top i { font-size: 15px; }

    .hero-title {
      font-size: 42px;
      font-family: inherit;
      font-weight: 500;
      line-height: normal;
      letter-spacing: 0.01em;
      margin-bottom: 14px;
      font-style: normal;
      /* Text effects based on user req */
      text-shadow: 0 4px 4px rgba(0, 0, 0, 0.25);
      background: linear-gradient(180deg, #FFF 15.62%, #FFF 57.47%, #7B95AA 85.88%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-title .city-name { color: white; display: inline-block; }
    /* The image inside the gradient text will be hidden by text-fill-color transparent 
       So we need to reset the text-fill-color for the express tag */
    .hero-title img {
      -webkit-text-fill-color: initial;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.15));
    }
    .hero-title .unlock-text {
      display: block;
      font-size: 64px;
      font-weight: 700;
      margin-top: 4px;
    }

    .hero-tags {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      margin-bottom: 0;
      flex-wrap: wrap;
    }
    .hero-tag {
      background: rgba(255,255,255,0.08); /* slightly lighter for blur */
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: rgba(255,255,255,1);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .hero-tag i { font-size: 14px; opacity: 1; text-shadow: none; color: white; }

    /* Product carousel */
    .product-carousel-wrapper {
      position: relative;
      z-index: 5;
      width: 100%;
      overflow: hidden;
      flex-shrink: 0;
      padding: 30px 0 76px;
      margin-top: 0;
    }
    .product-carousel-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(6, 14, 60, 0.4);
      pointer-events: none;
      z-index: 8;
    }
    .product-carousel-title {
      position: absolute;
      top: 4px;
      left: 0; right: 0;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      letter-spacing: 1px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .product-carousel-title i { color: var(--sams-orange); font-size: 15px; }
    .product-track {
      display: flex;
      gap: 10px;
      padding: 4px 0;
      animation: scrollLeft 35s linear infinite;
      width: max-content;
    }
    .product-track-reverse {
      animation-direction: reverse;
      animation-duration: 40s;
    }
    .product-item {
      flex-shrink: 0;
      width: 112px; height: 112px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      opacity: 0.85;
    }
    .product-item img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Scroll hint - arrow pointing UP for swipe gesture */
    .scroll-hint {
      position: absolute;
      bottom: 18px;
      left: 0; right: 0;
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      /* delayed appearance after entry anim */
      opacity: 0;
      animation: entryFadeIn 0.5s ease 1.8s forwards, hintBounce 2s ease-in-out 2.3s infinite;
    }
    .scroll-hint span {
      font-size: 11px;
      color: var(--sams-text-muted);
      letter-spacing: 1px;
    }

    /* ===== Screen 1 Entry Animations ===== */
    /* Override static opacity set inline - handled by JS adding .entered */
    .hero-bg img { opacity: 0; }
    .hero-bg.entered img {
      animation: bgFadeIn 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    .hero-content { opacity: 0; transform: translateY(20px); }
    .hero-content.entered {
      animation: contentSlideUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
    }
    .product-carousel-wrapper { opacity: 0; }
    .product-carousel-wrapper.entered {
      animation: entryFadeIn 0.7s ease 1.3s forwards;
    }

    /* ===== Screen 2 staggered fade-in ===== */
    .s2-fade {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .s2-fade.visible { opacity: 1; transform: translateY(0); }
    /* No nth-child here—use inline transition-delay on elements */

    /* Delivery zone: draw border on enter */
    .delivery-zone-path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
    }
    .delivery-zone-path.draw {
      animation: drawZone 1.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
    }
    .delivery-zone-fill {
      opacity: 0;
      transition: opacity 0.9s ease 1.6s;
    }
    .delivery-zone-fill.draw { opacity: 1; }
    .delivery-zone-glow {
      opacity: 0;
      transition: opacity 0.6s ease 2.0s;
    }
    .delivery-zone-glow.draw { opacity: 0.4; }

    .delivery-zone-text {
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.8s ease 1.8s, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.8s;
    }
    .delivery-zone-text.draw { 
      opacity: 1; 
      transform: scale(1);
    }

    /* ===== SCREEN 2: Map Query ===== */
    #screen-2 {
      background: var(--map-blue);
      position: relative;
    }


    .map-container {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    /* Grid overlay */
    .map-grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(30, 80, 200, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30, 80, 200, 0.1) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 1;
    }

    /* Map SVG */
    .map-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .gz-map {
      width: 100%; height: 100%;
    }

    /* Search bar - 修改3：全圆角 + 白色半透明毛玻璃 */
    .search-bar-wrapper {
      position: absolute;
      top: 14px;
      left: 14px; right: 14px;
      z-index: 20;
    }
    .search-bar {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(16px) saturate(1.8);
      -webkit-backdrop-filter: blur(16px) saturate(1.8);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 50px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: box-shadow 0.2s;
    }
    .search-bar:hover { box-shadow: 0 6px 28px rgba(0,0,0,0.35); }
    .search-icon { font-size: 16px; flex-shrink: 0; opacity: 0.7; }
    .search-placeholder {
      flex: 1;
      color: rgba(255,255,255,0.7);
      font-size: 13px;
    }
    /* 修改2：定位➜查找 */
    .search-locate-btn {
      background: var(--sams-blue);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      font-weight: 500;
    }

    /* 修改1：配送结果直接显示在搜索框下方，不用浮层 */
    .delivery-result-inline {
      margin-top: 8px;
      background: rgba(0, 20, 80, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 200, 255, 0.2);
      border-radius: 14px;
      padding: 10px 16px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .delivery-result-inline.visible { display: flex; }
    .delivery-result-inline .result-icon { font-size: 22px; flex-shrink: 0; }
    .delivery-result-inline .result-label {
      font-size: 13px;
      font-weight: 700;
      color: #6dd474;
    }
    .delivery-result-inline .result-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
    }

    /* Pin marker */
    .map-pin {
      position: absolute;
      z-index: 12;
      display: none;
      flex-direction: column;
      align-items: center;
      transform: translate(-50%, -100%);
      animation: pinDrop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .map-pin.visible { display: flex; }
    .pin-body {
      background: var(--sams-blue);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 0 4px rgba(18,90,220,0.25), 0 3px 12px rgba(18,90,220,0.5);
    }
    .pin-body::after {
      content: '';
      width: 8px; height: 8px;
      background: white;
      border-radius: 50%;
      transform: rotate(45deg);
    }
    .pin-shadow {
      width: 8px; height: 3px;
      background: rgba(0,0,0,0.25);
      border-radius: 50%;
      margin-top: 1px;
    }
    .map-pin.visible .pin-body::before {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(18,90,220,0.3);
      animation: radar 1.5s ease-out 0.2s;
    }

    /* Manager section - Transparent Layout with 40% White Border */
    .manager-section {
      position: relative;
      z-index: 10;
      margin: 0 16px 14px;
      padding: 12px 14px 12px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      background: transparent;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .manager-character {
      height: 72px;
      margin-top: -24px;
      margin-left: 10px;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }
    .manager-info { flex: 1; min-width: 0; }
    .manager-info p { font-size: 11px; color: rgba(255, 255, 255, 0.7); margin-top: 3px; }
    .manager-info b { font-size: 13px; font-weight: 700; color: white; display: block; }
    .consult-link {
      background: var(--sams-blue);
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      color: white;
      font-size: 12px; 
      font-weight: 700; 
      cursor: pointer;
      white-space: nowrap; 
      font-family: inherit;
      box-shadow: 0 3px 10px rgba(18,90,220,0.25);
      transition: all 0.2s;
    }
    .consult-link:active { transform: scale(0.96); }

    /* 修改4：加入会员按钮改为蓝色 + 毛玻璃 */
    .bottom-cta {
      position: relative;
      z-index: 10;
      padding: 10px 16px 28px;
      background: rgba(9, 18, 58, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      flex-shrink: 0;
    }
    .join-member-btn {
      width: 100%;
      background: rgba(18, 90, 220, 0.9);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 14px;
      padding: 15px;
      color: white;
      font-family: inherit;
      font-size: 17px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(18,90,220,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      letter-spacing: 0.3px;
    }
    .join-member-btn:active { transform: scale(0.98); opacity: 0.9; }
    .bottom-sub { text-align: center; margin-top: 8px; }
    .bottom-sub a {
      font-size: 10px; color: var(--sams-text-muted);
      text-decoration: none;
    }
    .bottom-sub a span { color: rgba(255,255,255,0.7); text-decoration: underline; }

    /* ===== SEARCH OVERLAY ===== */
    #search-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(5, 12, 50, 0.95);
      display: none;
      flex-direction: column;
      backdrop-filter: blur(8px);
    }
    #search-overlay.active { display: flex; }
    .overlay-header {
      padding: 16px 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .overlay-input-wrapper {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(100,150,255,0.35);
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
    }
    .overlay-input-wrapper input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: white;
      font-size: 14px;
      font-family: inherit;
    }
    .overlay-input-wrapper input::placeholder { color: rgba(255,255,255,0.35); }
    /* 修改2：支持清除按钮 */
    .overlay-clear-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      width: 20px; height: 20px;
      display: none;
      align-items: center; justify-content: center;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      flex-shrink: 0;
      font-family: inherit;
    }
    .overlay-clear-btn.visible { display: flex; }
    .overlay-cancel {
      background: none; border: none;
      color: rgba(255,255,255,0.6); font-size: 13px;
      cursor: pointer; font-family: inherit; padding: 4px 0;
      flex-shrink: 0;
    }
    .suggestions-list {
      flex: 1; overflow-y: auto; padding: 10px 0;
    }
    .suggestion-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 20px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: background 0.15s;
    }
    .suggestion-item:hover, .suggestion-item:active { background: rgba(255,255,255,0.05); }
    .suggestion-icon { font-size: 16px; flex-shrink: 0; opacity: 0.6; }
    .suggestion-text { flex: 1; }
    .suggestion-text .main { font-size: 14px; color: white; margin-bottom: 2px; }
    .suggestion-text .sub { font-size: 11px; color: rgba(255,255,255,0.4); }
    .suggestion-tag {
      display: inline-flex; align-items: center;
      flex-shrink: 0;
    }
    .suggestion-tag img { height: 18px; }
    .overlay-label {
      padding: 12px 20px 6px;
      font-size: 10px; color: rgba(255,255,255,0.3);
      letter-spacing: 1px; text-transform: uppercase;
    }

    /* ===== Animations ===== */
    @keyframes scrollLeft {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    /* Entry animations */
    @keyframes bgFadeIn {
      0% { opacity: 0; transform: scale(1.04); }
      100% { opacity: 0.55; transform: scale(1); }
    }
    @keyframes contentSlideUp {
      0% { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes entryFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes hintBounce {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-7px); opacity: 0.6; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes drawZone {
      0% { stroke-dashoffset: 900; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pinDrop {
      0% { transform: translate(-50%, -180%); opacity: 0; }
      60% { transform: translate(-50%, -85%); }
      100% { transform: translate(-50%, -100%); opacity: 1; }
    }
    @keyframes radar {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(4.5); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- ===== GLOBAL FIXED NAV ===== -->
<nav class="global-nav">
  <img src="assets/back.svg" alt="返回" width="36" height="36" style="cursor:pointer" onclick="history.back()" />
  <img src="assets/logo.svg" alt="Sam's Club" class="nav-logo-svg" height="22" />
  <img src="assets/share.svg" alt="分享" width="36" height="36" style="cursor:pointer" />
</nav>

<div id="scroll-container">

  <!-- ===== SCREEN 1: Hero Atmosphere ===== -->
  <section class="screen" id="screen-1">

    <!-- 修改6：首图背景替换为用户提供的实景图 -->
    <div class="hero-bg">
      <img src="assets/hero_bg.png" alt="广州小蛮腰" />
    </div>

    <!-- Hero Content -->
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="city-name">广州</span>
        <!-- 修改8：使用极速达SVG标签 -->
        <img src="assets/express_tag.svg" alt="极速达" style="height:0.7em; vertical-align:middle; margin: 0 4px; position:relative; top:-2px;" />
        <span class="unlock-text">解锁新区域</span>
      </h1>
      <div class="hero-tags">
        <span class="hero-tag"><i class="ri-box-3-line"></i> 99元包邮</span>
        <span class="hero-tag"><i class="ri-flashlight-fill"></i> 最快1小时到达</span>
        <span class="hero-tag"><i class="ri-shopping-cart-2-line"></i> 千款好物</span>
      </div>
    </div>

    <!-- 修改6：去掉门店插画，保留商品流 -->
    <!-- 修改7：替换为真实商品图 -->
    <div class="product-carousel-wrapper">
      <div class="product-carousel-title">
        会员常购好物
      </div>
      <div class="product-track" id="track1">
        <div class="product-item"><img src="assets/products/Frame 1321316287.png" alt="烘焙乳品"></div>
        <div class="product-item"><img src="assets/products/Frame 1321316289.png" alt="萌宠生活"></div>
        <div class="product-item"><img src="assets/products/Frame 1321316289-1.png" alt="商品"></div>
        <div class="product-item"><img src="assets/products/Frame 1321316289-2.png" alt="商品"></div>

<!-- ===== SEARCH OVERLAY ===== -->
<div id="search-overlay">
  <div class="overlay-header">
    <div class="overlay-input-wrapper">
      <i class="ri-search-line" style="color:rgba(255,255,255,0.6)"></i>
      <input type="text" id="search-input" placeholder="输入广州地址..." autocomplete="off" />
      <!-- 修改2：清除按钮 -->
      <button class="overlay-clear-btn" id="clear-btn" onclick="clearSearch()"><i class="ri-close-circle-fill"></i></button>
    </div>
    <button class="overlay-cancel" onclick="closeSearch()">取消</button>
  </div>
  <p class="overlay-label">广州热门地区</p>
  <div class="suggestions-list" id="suggestions-list">
    <!-- Suggestions rendered by JS -->
  </div>
</div>

<script>
  // ===== Address Data (Guangzhou) =====
  const GZ_ADDRESSES = [
    { main: "天河区体育西路", sub: "广州市天河区", supported: true },
    { main: "天河区珠江新城花城广场", sub: "广州市天河区", supported: true },
    { main: "天河区正佳广场", sub: "广州市天河区天河路228号", supported: true },
    { main: "天河区林和西路", sub: "广州市天河区", supported: true },
    { main: "天河区石牌村", sub: "广州市天河区", supported: true },
    { main: "天河区天河北路", sub: "广州市天河区", supported: true },
    { main: "天河区中山大道西", sub: "广州市天河区", supported: true },
    { main: "越秀区北京路步行街", sub: "广州市越秀区", supported: false },
    { main: "海珠区南洲路", sub: "广州市海珠区", supported: false },
    { main: "番禺区大学城", sub: "广州市番禺区", supported: false },
    { main: "白云区机场路", sub: "广州市白云区", supported: false },
    { main: "黄埔区科学城", sub: "广州市黄埔区", supported: false },
    { main: "荔湾区上下九步行街", sub: "广州市荔湾区", supported: false },
  ];

  let selectedAddress = null;

  // ===== Search Overlay Logic =====
  document.getElementById('search-trigger').addEventListener('click', openSearch);

  function openSearch() {
    document.getElementById('search-overlay').classList.add('active');
    setTimeout(() => document.getElementById('search-input').focus(), 100);
    renderSuggestions(GZ_ADDRESSES);
  }

  function closeSearch() {
    document.getElementById('search-overlay').classList.remove('active');
    document.getElementById('search-input').value = '';
    document.getElementById('clear-btn').classList.remove('visible');
    renderSuggestions(GZ_ADDRESSES);
  }

  // 修改2：清除搜索内容
  function clearSearch() {
    document.getElementById('search-input').value = '';
    document.getElementById('clear-btn').classList.remove('visible');
    renderSuggestions(GZ_ADDRESSES);
    document.getElementById('search-input').focus();
  }

  document.getElementById('search-input').addEventListener('input', function() {
    const val = this.value.trim();
    // 修改2：有内容时显示清除按钮
    if (val) {
      document.getElementById('clear-btn').classList.add('visible');
    } else {
      document.getElementById('clear-btn').classList.remove('visible');
    }
    if (!val) { renderSuggestions(GZ_ADDRESSES); return; }
    const filtered = GZ_ADDRESSES.filter(a => a.main.includes(val) || a.sub.includes(val));
    const custom = [{ main: val + " (广州)", sub: "广州市内地址", supported: true }, ...filtered];
    renderSuggestions(custom.slice(0, 8));
  });

  function renderSuggestions(list) {
    const container = document.getElementById('suggestions-list');
    container.innerHTML = '';
    if (list.length === 0) {
      container.innerHTML = '<div style="padding:40px 20px; text-align:center; color:rgba(255,255,255,0.3); font-size:14px;">未找到匹配地址</div>';
      return;
    }
    list.forEach(item => {
      const div = document.createElement('div');
      div.className = 'suggestion-item';
      div.innerHTML = `
        <i class="ri-map-pin-2-line suggestion-icon"></i>
        <div class="suggestion-text">
          <div class="main">${item.main}</div>
          <div class="sub">${item.sub}</div>
        </div>
        ${item.supported ? '<span class="suggestion-tag"><img src="assets/express_tag.svg" alt="极速达" /></span>' : ''}
      `;
      div.addEventListener('click', () => selectAddress(item));
      container.appendChild(div);
    });
  }

  function selectAddress(item) {
    selectedAddress = item;
    // 修改2：搜索框只显示地址名，不重复
    document.getElementById('search-display-text').textContent = item.main;
    document.getElementById('search-display-text').style.color = 'rgba(255,255,255,0.9)';
    closeSearch();
    showResult(item);
  }

  function showResult(item) {
    // 修改1：结果卡显示在搜索框下方（不用浮层）
    const result = document.getElementById('delivery-result');
    result.classList.remove('visible');
    void result.offsetWidth;
    result.classList.add('visible');

    // Show pin on map
    const pin = document.getElementById('map-pin');
    pin.classList.remove('visible');
    void pin.offsetWidth;
    // Position pin near Henghe hotel area with slight randomization
    const baseLeft = 51 + (Math.random() * 6 - 3);
    const baseTop = 42 + (Math.random() * 6 - 3);
    pin.style.left = baseLeft + '%';
    pin.style.top = baseTop + '%';
    setTimeout(() => pin.classList.add('visible'), 80);
  }

  function handleLocate() {
    const gpsAddr = { main: "天河区恒和酒店附近", sub: "广州市天河区", supported: true };
    document.getElementById('search-display-text').textContent = gpsAddr.main;
    document.getElementById('search-display-text').style.color = 'rgba(255,255,255,0.9)';
    showResult(gpsAddr);
  }

  // ===== Init =====
  renderSuggestions(GZ_ADDRESSES);

  // ===== Screen 1 entry animation =====
  (function initScreen1() {
    const heroBg = document.querySelector('.hero-bg');
    const heroContent = document.querySelector('.hero-content');
    const carousel = document.querySelector('.product-carousel-wrapper');
    // Trigger staggered entry
    requestAnimationFrame(() => {
      heroBg.classList.add('entered');
      setTimeout(() => heroContent.classList.add('entered'), 50);
      setTimeout(() => carousel.classList.add('entered'), 100);
    });
  })();

  // ===== Screen 2 entry animation via IntersectionObserver =====
  let screen2Animated = false;
  const screen2 = document.getElementById('screen-2');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !screen2Animated) {
        screen2Animated = true;
        // Trigger delivery zone draw
        const fill = document.querySelector('.delivery-zone-fill');
        const border = document.querySelector('.delivery-zone-path');
        const glow = document.querySelector('.delivery-zone-glow');
        const zoneText = document.querySelector('.delivery-zone-text');
        setTimeout(() => {
          fill && fill.classList.add('draw');
          border && border.classList.add('draw');
          glow && glow.classList.add('draw');
          zoneText && zoneText.classList.add('draw');
        }, 200);
        // Staggered fade-in for search bar and lower elements
        const searchWrapper = document.querySelector('.search-bar-wrapper');
        const manager = document.getElementById('s2-manager');
        const cta = document.getElementById('s2-cta');
        setTimeout(() => searchWrapper && searchWrapper.classList.add('visible'), 100);
        setTimeout(() => manager && manager.classList.add('visible'), 600);
        setTimeout(() => cta && cta.classList.add('visible'), 850);
      }
    });
  }, { threshold: 0.5 });

  observer.observe(screen2);

  // ===== Also make search-bar-wrapper a fade element =====
  document.querySelector('.search-bar-wrapper').classList.add('s2-fade');

</script>
