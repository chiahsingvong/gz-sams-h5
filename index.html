<!DOCTYPE html>
<!-- 测试更新：这是一行废话注释，用来验证 Git 提交和自动部署流程 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>广州极速达 · 山姆新仓开业</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #060e3c; }
    body { font-family: 'Noto Sans SC', 'PingFang SC', sans-serif; color: white; }

    /* ===== CSS Variables ===== */
    :root {
      --sams-blue: #125ADC;
      --sams-orange: #FF7820;
      --sams-text-muted: rgba(255,255,255,0.5);
      --map-blue: #09123a;
    }

    /* ===== Scroll Container ===== */
    #scroll-container {
      width: 100%;
      min-height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    #scroll-container::-webkit-scrollbar { display: none; }

    /* ===== Screen Base ===== */
    .screen {
      width: 100%;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      padding-top: 56px;
    }

    /* ===== NAV BAR - fixed, covers both screens ===== */
    .global-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      /* frosted glass */
      background: rgba(6, 14, 60, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      height: 56px;
    }
    .global-nav img {
      display: block;
    }
    .nav-logo-svg {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ===== SCREEN 1: Hero ===== */
    #screen-1 {
      background: #060e3c;
      justify-content: center;
      height: 100svh;
      min-height: auto;
    }
    .hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 80%;
      z-index: 0;
      overflow: hidden;
    }
    .hero-bg img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0.55;
    }
    /* dark overlay + bottom fade to screen bg color */
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(6,14,60,0.6) 0%,
        rgba(6,14,60,0.25) 35%,
        rgba(6,14,60,0.3) 60%,
        rgba(6,14,60,0.7) 85%,
        #060e3c 100%
      );
    }

    .hero-content {
      position: relative;
      z-index: 5;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
      text-align: center;
      margin: auto 0;
    }
    .hero-subtitle-top {
      font-size: 13px;
      color: var(--sams-text-muted);
      letter-spacing: 2px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hero-subtitle-top i { font-size: 15px; }

    .hero-title {
      font-size: 42px;
      font-family: inherit;
      font-weight: 500;
      line-height: normal;
      letter-spacing: 0.01em;
      margin-bottom: 14px;
      font-style: normal;
      /* Text effects based on user req */
      text-shadow: 0 4px 4px rgba(0, 0, 0, 0.25);
      background: linear-gradient(180deg, #FFF 15.62%, #FFF 57.47%, #7B95AA 85.88%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-title .city-name { color: white; display: inline-block; }
    /* The image inside the gradient text will be hidden by text-fill-color transparent 
       So we need to reset the text-fill-color for the express tag */
    .hero-title img {
      -webkit-text-fill-color: initial;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.15));
    }
    .hero-title .unlock-text {
      display: block;
      font-size: 64px;
      font-weight: 700;
      margin-top: 4px;
    }

    .hero-tags {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      margin-bottom: 0;
      flex-wrap: wrap;
    }
    .hero-tag {
      background: rgba(255,255,255,0.08); /* slightly lighter for blur */
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: rgba(255,255,255,1);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .hero-tag i { font-size: 14px; opacity: 1; text-shadow: none; color: white; }

    /* Map peek at bottom of hero - directly shows the map */
    .map-peek {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 25vh;
      z-index: 5;
      overflow: hidden;
      pointer-events: none;
      background: #09123a;
      /* Top edge fades into hero bg color */
      mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.5) 35%, rgba(0,0,0,1) 60%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.5) 35%, rgba(0,0,0,1) 60%);
    }
    .map-peek-svg {
      width: 100%; height: 100%;
      opacity: 0.7;
    }
    /* Breathing glow overlay */
    .map-peek-glow {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 25vh;
      z-index: 6;
      pointer-events: none;
    }
    .map-peek-glow::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 90% 80% at 50% 100%, rgba(18,90,220,0.5) 0%, rgba(100,180,255,0.2) 35%, transparent 65%);
      animation: breatheA 4s ease-in-out infinite;
    }
    .map-peek-glow::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 100%, rgba(130,200,255,0.35) 0%, rgba(18,90,220,0.15) 40%, transparent 60%);
      animation: breatheB 4s ease-in-out infinite 2s;
    }
    @keyframes breatheA {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes breatheB {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.2; }
    }

    /* City switcher capsule */
    .city-switcher-capsule {
      position: relative;
      z-index: 20;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      cursor: pointer;
      width: fit-content;
      margin-bottom: 14px;
      transition: background 0.2s;
    }
    .city-switcher-capsule:active { background: rgba(255,255,255,0.18); }
    .city-dot {
      width: 6px; height: 6px;
      background: #6dd474;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(109,212,116,0.5); }
      50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(109,212,116,0); }
    }
    .city-switcher-capsule .city-name-label {
      font-size: 13px; font-weight: 700; color: white;
    }
    .city-switcher-capsule .city-more {
      font-size: 11px; color: rgba(255,255,255,0.5);
    }
    .city-switcher-capsule .city-arrow {
      font-size: 14px; color: rgba(255,255,255,0.4);
      transition: transform 0.3s;
    }

    /* City drawer overlay */
    .city-drawer-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .city-drawer-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .city-drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 201;
      background: #0c1645;
      border-top: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px 20px 0 0;
      padding: 0 0 34px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .city-drawer.active {
      transform: translateY(0);
    }
    .city-drawer-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 10px auto 16px;
    }
    .city-drawer-title {
      padding: 0 20px 14px;
      font-size: 16px;
      font-weight: 700;
      color: white;
    }
    .city-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 50vh;
      overflow-y: auto;
    }
    .city-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .city-list-item:active { background: rgba(255,255,255,0.06); }
    .city-list-item.selected {
      background: rgba(18,90,220,0.2);
      border: 1px solid rgba(18,90,220,0.4);
    }
    .city-list-item .city-item-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6dd474;
      flex-shrink: 0;
    }
    .city-list-item .city-item-name {
      flex: 1; font-size: 15px; color: white; font-weight: 500;
    }
    .city-list-item .city-item-check {
      font-size: 16px; color: var(--sams-blue);
    }

    /* Scroll progress bar */
    .scroll-progress {
      position: fixed;
      top: 56px; right: 0;
      width: 2px; height: calc(100% - 56px);
      z-index: 100;
    }
    .scroll-progress-fill {
      width: 100%; height: 0%;
      background: linear-gradient(to bottom, var(--sams-blue), var(--sams-orange));
      border-radius: 1px;
      transition: height 0.1s;
    }

    /* Scroll hint - fixed above CTA button */
    .scroll-hint {
      position: fixed;
      bottom: 110px;
      left: 0; right: 0;
      z-index: 101;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      opacity: 0;
      animation: entryFadeIn 0.5s ease 1.8s forwards, hintBounce 2s ease-in-out 2.3s infinite;
      transition: opacity 0.3s ease;
    }
    .scroll-hint.hidden {
      opacity: 0 !important;
      animation: none;
    }
    .scroll-hint span {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(100,180,255,0.5);
    }
    .scroll-hint svg {
      filter: drop-shadow(0 0 4px rgba(100,180,255,0.4));
    }

    /* ===== Screen 1 Entry Animations ===== */
    /* Override static opacity set inline - handled by JS adding .entered */
    .hero-bg img { opacity: 0; }
    .hero-bg.entered img {
      animation: bgFadeIn 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }
    .hero-content { opacity: 0; transform: translateY(20px); }
    .hero-content.entered {
      animation: contentSlideUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
    }

    /* ===== Screen 2 staggered fade-in ===== */
    .s2-fade {
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .s2-fade.visible { opacity: 1; transform: translateY(0); }
    /* No nth-child here—use inline transition-delay on elements */

    /* Delivery zone: draw border on enter */
    .delivery-zone-path {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
    }
    .delivery-zone-path.draw {
      animation: drawZone 1.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
    }
    .delivery-zone-fill {
      opacity: 0;
      transition: opacity 0.9s ease 1.6s;
    }
    .delivery-zone-fill.draw { opacity: 1; }
    .delivery-zone-glow {
      opacity: 0;
      transition: opacity 0.6s ease 2.0s;
    }
    .delivery-zone-glow.draw { opacity: 0.4; }

    .delivery-zone-text {
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.8s ease 1.8s, transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1.8s;
    }
    .delivery-zone-text.draw { 
      opacity: 1; 
      transform: scale(1);
    }

    /* ===== SCREEN 2: Map Query ===== */
    #screen-2 {
      background: var(--map-blue);
      position: relative;
      min-height: 100svh;
      padding-top: 0;
      padding-bottom: 100px;
    }

    .map-container {
      position: relative;
      flex: 1;
      overflow: hidden;
      min-height: 50vh;
    }

    /* Grid overlay */
    .map-grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(30, 80, 200, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30, 80, 200, 0.1) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 1;
    }

    /* Map SVG */
    .map-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .gz-map {
      width: 100%; height: 100%;
    }

    /* Manager section - Transparent Layout with 40% White Border */
    .manager-section {
      position: relative;
      z-index: 10;
      margin: 0 16px 14px;
      padding: 12px 14px 12px 0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      background: transparent;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .manager-character {
      height: 72px;
      margin-top: -24px;
      margin-left: 10px;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }
    .manager-info { flex: 1; min-width: 0; }
    .manager-info p { font-size: 11px; color: rgba(255, 255, 255, 0.7); margin-top: 3px; }
    .manager-info b { font-size: 13px; font-weight: 700; color: white; display: block; }
    .consult-link {
      background: var(--sams-blue);
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      color: white;
      font-size: 12px; 
      font-weight: 700; 
      cursor: pointer;
      white-space: nowrap; 
      font-family: inherit;
      box-shadow: 0 3px 10px rgba(18,90,220,0.25);
      transition: all 0.2s;
    }
    .consult-link:active { transform: scale(0.96); }

    /* 修改4：加入会员按钮 - 固定在底部 */
    .bottom-cta {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 10px 16px 28px;
      background: rgba(9, 18, 58, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .join-member-btn {
      width: 100%;
      background: rgba(18, 90, 220, 0.9);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 14px;
      padding: 15px;
      color: white;
      font-family: inherit;
      font-size: 17px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(18,90,220,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      letter-spacing: 0.3px;
    }
    .join-member-btn:active { transform: scale(0.98); opacity: 0.9; }
    .bottom-sub { text-align: center; margin-top: 8px; }
    .bottom-sub a {
      font-size: 10px; color: var(--sams-text-muted);
      text-decoration: none;
    }
    .bottom-sub a span { color: rgba(255,255,255,0.7); text-decoration: underline; }

    /* Fixed bottom glow - breathing effect above CTA */
    .fixed-bottom-glow {
      position: fixed;
      bottom: 70px; left: 0; right: 0;
      height: 80px;
      z-index: 99;
      pointer-events: none;
    }
    .fixed-bottom-glow::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 90% 100% at 50% 100%, rgba(18,90,220,0.4) 0%, rgba(100,180,255,0.15) 40%, transparent 70%);
      animation: breatheA 4s ease-in-out infinite;
    }
    .fixed-bottom-glow::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 80% at 50% 100%, rgba(130,200,255,0.3) 0%, rgba(18,90,220,0.1) 45%, transparent 65%);
      animation: breatheB 4s ease-in-out infinite 2s;
    }



    /* ===== Animations ===== */

    /* Entry animations */
    @keyframes bgFadeIn {
      0% { opacity: 0; transform: scale(1.04); }
      100% { opacity: 0.55; transform: scale(1); }
    }
    @keyframes contentSlideUp {
      0% { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes entryFadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes hintBounce {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(-7px); opacity: 0.6; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes drawZone {
      0% { stroke-dashoffset: 900; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes pinDrop {
      0% { transform: translate(-50%, -180%); opacity: 0; }
      60% { transform: translate(-50%, -85%); }
      100% { transform: translate(-50%, -100%); opacity: 1; }
    }
    @keyframes radar {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(4.5); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- ===== GLOBAL FIXED NAV ===== -->
<nav class="global-nav">
  <img src="assets/back.svg" alt="返回" width="36" height="36" style="cursor:pointer" onclick="history.back()" />
  <img src="assets/logo.svg" alt="Sam's Club" class="nav-logo-svg" height="22" />
  <img src="assets/share.svg" alt="分享" width="36" height="36" style="cursor:pointer" />
</nav>

<div id="scroll-container">

  <!-- ===== SCREEN 1: Hero Atmosphere ===== -->
  <section class="screen" id="screen-1">

    <!-- 修改6：首图背景替换为用户提供的实景图 -->
    <div class="hero-bg">
      <img src="assets/hero_bg.png" alt="广州小蛮腰" />
    </div>

    <!-- Hero Content -->
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="city-name">广州</span>
        <!-- 修改8：使用极速达SVG标签 -->
        <img src="assets/express_tag.svg" alt="极速达" style="height:0.7em; vertical-align:middle; margin: 0 4px; position:relative; top:-2px;" />
        <span class="unlock-text">解锁新区域</span>
      </h1>
      <div class="hero-tags">
        <span class="hero-tag"><i class="ri-box-3-line"></i> 99元包邮</span>
        <span class="hero-tag"><i class="ri-flashlight-fill"></i> 最快1小时到达</span>
        <span class="hero-tag"><i class="ri-shopping-cart-2-line"></i> 千款好物</span>
      </div>
    </div>

    <!-- Map peek under hero - SVG grid lines preview with breathing glow -->
    <div class="map-peek">
      <svg class="map-peek-svg" viewBox="0 0 375 300" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
        <!-- Background matches map area -->
        <rect width="375" height="300" fill="#09123a"/>
        <!-- Grid background pattern -->
        <rect x="0" y="0" width="375" height="300" fill="url(#peekGrid)"/>
        <defs>
          <pattern id="peekGrid" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(30,80,200,0.12)" stroke-width="1"/>
          </pattern>
        </defs>
        <!-- Main streets -->
        <rect x="0" y="120" width="375" height="8" fill="#1e50c8" opacity="0.5"/>
        <rect x="155" y="0" width="8" height="300" fill="#1e50c8" opacity="0.5"/>
        <rect x="255" y="0" width="6" height="300" fill="#1a3fa0" opacity="0.4"/>
        <rect x="90" y="0" width="5" height="300" fill="#162e8a" opacity="0.35"/>
        <rect x="0" y="200" width="375" height="6" fill="#1a3fa0" opacity="0.4"/>
        <rect x="310" y="0" width="4" height="300" fill="#162e8a" opacity="0.3"/>
        <rect x="0" y="55" width="375" height="5" fill="#162e8a" opacity="0.3"/>
        <!-- Delivery zone outline -->
        <path d="M165 50 L245 50 L258 70 L262 120 L258 190 L245 250 L165 260 L150 230 L148 190 L142 145 L140 120 L148 70 Z" 
              fill="none" stroke="rgba(255,120,30,0.2)" stroke-width="2" stroke-dasharray="6 4"/>
      </svg>
    </div>
    <div class="map-peek-glow"></div>

  </section>

  <!-- ===== SCREEN 2: Map Query ===== -->
  <section class="screen" id="screen-2">
    <!-- Map area -->
    <div class="map-container">
      <div class="map-grid-overlay"></div>

          <!-- Delivery zone fill (fades in after border drawn) -->
          <path class="delivery-zone-fill" d="

<!-- Scroll hint (above CTA) -->

  <svg width="16" height="9" viewBox="0 0 16 9" fill="none">

    加入山姆会员，领取百元礼包
  </button>

    <a href="#">通过此链接办卡助分享人赢好礼 <span>活动规则 ›</span></a>
  </div>

<!-- City Drawer -->
<div class="city-drawer-overlay" id="city-drawer-overlay" onclick="closeCityDrawer()"></div>
<div class="city-drawer" id="city-drawer">
  <div class="city-drawer-handle"></div>
  <div class="city-drawer-title">极速达开仓城市</div>
  <div class="city-list" id="city-list">
    <!-- rendered by JS -->
  </div>
</div>

<!-- Scroll progress bar -->
<div class="scroll-progress"><div class="scroll-progress-fill" id="scroll-progress-fill"></div></div>

<script>
  // ===== City Data =====
  const CITIES = [
    { name: '广州', active: true },
    { name: '深圳', active: true },
    { name: '上海', active: true },
    { name: '北京', active: true },
    { name: '杭州', active: true },
    { name: '成都', active: true },
    { name: '武汉', active: true },
    { name: '南京', active: true },
  ];
  let currentCity = '广州';

  // ===== Screen 1 entry animation =====
  (function initScreen1() {
    const heroBg = document.querySelector('.hero-bg');
    const heroContent = document.querySelector('.hero-content');
    requestAnimationFrame(() => {
      heroBg.classList.add('entered');
      setTimeout(() => heroContent.classList.add('entered'), 50);
    });
  })();

  // ===== Scroll-driven parallax =====
  const heroContent = document.querySelector('.hero-content');
  const heroBg = document.querySelector('.hero-bg');
  const scrollHint = document.querySelector('.scroll-hint');
  const progressFill = document.getElementById('scroll-progress-fill');

  window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const vh = window.innerHeight;
    const docHeight = document.documentElement.scrollHeight - vh;

    // Progress bar
    if (progressFill) {
      const pct = Math.min(scrollY / docHeight * 100, 100);
      progressFill.style.height = pct + '%';
    }

    // Hero parallax: content fades out and moves up as you scroll
    if (heroContent) {
      const progress = Math.min(scrollY / (vh * 0.5), 1);
      heroContent.style.opacity = 1 - progress;
      heroContent.style.transform = `translateY(${-scrollY * 0.3}px)`;
    }

    // Hero bg parallax (slower)
    if (heroBg) {
      heroBg.style.transform = `translateY(${-scrollY * 0.15}px)`;
    }

    // Hide scroll hint when user starts scrolling
    if (scrollHint) {
      if (scrollY > vh * 0.08) {
        scrollHint.classList.add('hidden');
      } else {
        scrollHint.classList.remove('hidden');
      }
    }
  });

  // ===== Screen 2 entry animation via IntersectionObserver =====
  let screen2Animated = false;
  const screen2 = document.getElementById('screen-2');

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && !screen2Animated) {
        screen2Animated = true;
        // Trigger delivery zone draw
        const fill = document.querySelector('.delivery-zone-fill');
        const border = document.querySelector('.delivery-zone-path');
        const glow = document.querySelector('.delivery-zone-glow');
        const zoneText = document.querySelector('.delivery-zone-text');
        setTimeout(() => {
          fill && fill.classList.add('draw');
          border && border.classList.add('draw');
          glow && glow.classList.add('draw');
          zoneText && zoneText.classList.add('draw');
        }, 200);
        // Staggered fade-in for city switcher and lower elements
        const citySwitcher = document.getElementById('city-switcher');
        const manager = document.getElementById('s2-manager');
        setTimeout(() => citySwitcher && citySwitcher.classList.add('visible'), 400);
        setTimeout(() => manager && manager.classList.add('visible'), 600);
      }
    });
  }, { threshold: 0.3 });

  observer.observe(screen2);



  // ===== City Drawer Logic =====
  function openCityDrawer() {
    document.getElementById('city-drawer-overlay').classList.add('active');
    document.getElementById('city-drawer').classList.add('active');
    renderCityList();
  }

  function closeCityDrawer() {
    document.getElementById('city-drawer-overlay').classList.remove('active');
    document.getElementById('city-drawer').classList.remove('active');
  }

  function renderCityList() {
    const container = document.getElementById('city-list');
    container.innerHTML = '';
    CITIES.forEach(city => {
      const div = document.createElement('div');
      div.className = 'city-list-item' + (city.name === currentCity ? ' selected' : '');
      div.innerHTML = `
        <span class="city-item-dot"></span>
        <span class="city-item-name">${city.name}</span>
        ${city.name === currentCity ? '<i class="ri-check-line city-item-check"></i>' : ''}
      `;
      div.addEventListener('click', () => switchCity(city.name));
      container.appendChild(div);
    });
  }

  function switchCity(cityName) {
    if (cityName === currentCity) { closeCityDrawer(); return; }
    currentCity = cityName;

    // Update city label
    document.getElementById('city-label').textContent = cityName;

    // Update hero title city name
    const heroCity = document.querySelector('.hero-title .city-name');
    if (heroCity) heroCity.textContent = cityName;

    // Map transition animation
    const mapContainer = document.querySelector('.map-container');
    mapContainer.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
    mapContainer.style.transform = 'scale(0.95)';
    mapContainer.style.opacity = '0.3';
    setTimeout(() => {
      // Reset animation for delivery zone
      screen2Animated = false;
      const fill = document.querySelector('.delivery-zone-fill');
      const border = document.querySelector('.delivery-zone-path');
      const glow = document.querySelector('.delivery-zone-glow');
      const zoneText = document.querySelector('.delivery-zone-text');
      [fill, border, glow, zoneText].forEach(el => el && el.classList.remove('draw'));

      mapContainer.style.transform = 'scale(1)';
      mapContainer.style.opacity = '1';

      // Re-trigger zone draw animation
      setTimeout(() => {
        [fill, border, glow, zoneText].forEach(el => el && el.classList.add('draw'));
      }, 300);
    }, 400);

    closeCityDrawer();
  }

</script>
</body>
